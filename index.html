<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSC Sports - Operations Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Apple Glass Color Palette */
            --glass-bg: rgba(30, 30, 30, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            /* More subtle border */
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --glass-blur: blur(25px);
            /* Stronger blur */

            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.70);
            --text-tertiary: rgba(255, 255, 255, 0.45);

            /* Monday Status Colors */
            --status-done: #00ca72;
            --status-working: #fdab3d;
            --status-stuck: #e2445c;
            --status-empty: rgba(255, 255, 255, 0.1);
            --status-waiting: #a25ddc;
            /* Purple for waiting */

            /* Priority Colors */
            --priority-high: #e2445c;
            --priority-medium: #fdab3d;
            --priority-low: #579bfc;
            --priority-critical: #333333;
            /* Dark/Black for critical */

            /* Group Colors */
            --group-gal: #579bfc;
            --group-itay: #a25ddc;
            --group-itzik: #00ca72;
            --group-tom: #ffcc00;
            --group-general: #787878;
        }

        body {
            font-family: 'Heebo', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
            /* Ultra-Sharp Tech Background - Ensure dashboard_ultra_sharp.png is uploaded */
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.4)),
                url('dashboard_ultra_sharp.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            image-rendering: -webkit-optimize-contrast;
            /* Extra sharpness for modern browsers */
        }

        /* Removed pseudo-element to stay safe with backgrounds */

        /* Glass Utility Class */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--glass-border);
            z-index: 10;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
            font-weight: 500;
            cursor: pointer;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            cursor: pointer;
        }

        .nav-item.active {
            background: var(--glass-border);
            color: #3498db;
        }

        .view-content {
            display: none;
            width: 100%;
        }

        .view-content.active {
            display: block;
        }

        .nav-item i {
            width: 20px;
            text-align: center;
        }

        /* Main Content */
        .main {
            flex: 1;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .title-area h1 {
            font-size: 32px;
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        /* Table Container - window style */
        .table-window {
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .table-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            padding-bottom: 40px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 1000px;
        }

        /* Sticky Header */
        thead th {
            text-align: right;
            padding: 12px 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            background: rgba(40, 40, 40, 0.85);
            /* Solid semi-transparent for readability */
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 1px solid var(--glass-border);
        }

        /* Group Headers */
        .group-header td {
            padding: 24px 20px 12px 20px;
            font-size: 18px;
            font-weight: 500;
            /* color set via inline style */
            background: transparent;
            border: none;
        }

        .group-header:first-child td {
            padding-top: 20px;
        }

        .group-toggle {
            cursor: pointer;
            transition: transform 0.2s;
            display: inline-block;
            margin-left: 8px;
        }

        .group-col-header {
            font-size: 14px;
            opacity: 0.8;
            font-weight: 400;
        }

        /* Rows */
        tbody tr.task-row {
            background: rgba(255, 255, 255, 0.02);
            transition: background 0.15s;
        }

        tbody tr.task-row:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        tbody td {
            padding: 10px 20px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            vertical-align: middle;
            color: var(--text-primary);
        }

        /* First cell with border */
        tbody td:first-child {
            border-right: 4px solid transparent;
            /* Colored border will go here */
        }

        /* Status Pills */
        .status-pill {
            display: block;
            width: 100%;
            padding: 6px 0;
            text-align: center;
            color: white;
            font-size: 13px;
            font-weight: 500;
            border-radius: 4px;
            /* Monday style boxy check */
            cursor: pointer;
            transition: filter 0.2s;
        }

        .status-pill:hover {
            filter: brightness(1.1);
        }

        /* Helper Classes for Colors */
        .bg-working {
            background-color: var(--status-working);
        }

        .bg-done {
            background-color: var(--status-done);
        }

        .bg-stuck {
            background-color: var(--status-stuck);
        }

        .bg-waiting {
            background-color: var(--status-waiting);
        }

        .bg-empty {
            background-color: var(--status-empty);
            color: var(--text-tertiary);
        }

        .bg-high {
            background-color: var(--priority-high);
        }

        .bg-medium {
            background-color: var(--priority-medium);
        }

        .bg-low {
            background-color: var(--priority-low);
        }

        .bg-critical {
            background-color: var(--priority-critical);
        }

        /* Subitems */
        .subitem-row td {
            background: rgba(0, 0, 0, 0.1);
            font-size: 13px;
            color: var(--text-secondary);
            padding-top: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.015);
        }

        .subitem-indent {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-right: 20px;
            /* Indent */
        }

        .subitem-icon {
            font-size: 10px;
            opacity: 0.5;
            transform: scaleX(-1);
            /* RTL arrow fix if needed */
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Notes Panel */
        /* Notes Panel Updates */
        .notes-panel {
            position: fixed;
            top: 0;
            right: -550px;
            width: 550px;
            height: 100vh;
            background: rgba(25, 25, 30, 0.9);
            backdrop-filter: blur(50px) saturate(180%);
            -webkit-backdrop-filter: blur(50px) saturate(180%);
            border-left: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: -15px 0 50px rgba(0, 0, 0, 0.6);
            z-index: 2000;
            transition: right 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        .notes-panel.open {
            right: 0;
        }

        /* Contacts Modal Specific Styles */
        .contacts-modal {
            background: rgba(25, 25, 30, 0.95);
            backdrop-filter: blur(50px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            padding: 0;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            max-width: 90vw;
            max-height: 85vh;
            overflow: hidden;
        }

        .notes-header {
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notes-header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .toolbar {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .toolbar-btn:hover {
            background: rgba(52, 152, 219, 0.2);
            color: #fff;
            border-color: rgba(52, 152, 219, 0.5);
        }

        .toolbar-btn.active {
            background: #3498db;
            color: #fff;
            border-color: #3498db;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }

        .notes-body {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        .notes-editor {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px;
            line-height: 1.7;
            outline: none;
            word-wrap: break-word;
        }

        .notes-editor:empty:before {
            content: attr(placeholder);
            color: var(--text-tertiary);
            pointer-events: none;
        }

        .notes-footer {
            padding: 24px 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: flex-end;
            gap: 16px;
        }

        .save-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 28px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15);
            transition: all 0.2s;
        }

        .save-btn:hover {
            background: #f0f0f0;
            transform: translateY(-1px);
        }

        .save-btn:active {
            transform: translateY(0);
        }

        .notes-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            backdrop-filter: blur(4px);
        }

        .notes-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .note-preview {
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 11px;
            color: var(--text-tertiary);
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
        }

        .notes-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .notes-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>

<body>

    <div class="sidebar glass-panel">
        <div class="logo">
            <img src="https://cdn.brandfetch.io/wsc-sports.com/logo" alt="WSC Sports"
                style="width: 12vw; max-width: 90%; height: auto; filter: brightness(0) invert(1);">
        </div>
        <div class="nav-item active" onclick="switchView('main-table')">
            <i class="fas fa-table"></i>
            <span>Main Table</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-chart-bar"></i>
            <span>Dashboards</span>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <div class="title-area glass-panel"
                style="display: flex; justify-content: space-between; align-items: center; padding: 15px 25px;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div
                        style="background: var(--group-gal); width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-table" style="font-size: 20px;"></i>
                    </div>
                    <div>
                        <h1 style="font-size: 24px; margin: 0; font-weight: 500;">ניהול משימות צוות</h1>
                        <span style="font-size: 13px; opacity: 0.6;">תיקיית פרוייקטים / 2024 / Q4</span>
                    </div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button onclick="openEmailModal()" style="
                        background: rgba(52, 152, 219, 0.2);
                        border: 1px solid rgba(52, 152, 219, 0.5);
                        color: white;
                        padding: 8px 16px;
                        border-radius: 6px;
                        cursor: pointer;
                        font-size: 13px;
                        display: flex;
                        align-items: center;
                        gap: 8px;
                    ">
                        <i class="fas fa-address-book"></i>
                        אנשי קשר
                    </button>
                    <button id="authorize_button" onclick="handleAuthClick()" style="
                        background: rgba(255, 255, 255, 0.1);
                        border: 1px solid var(--glass-border);
                        color: white;
                        padding: 8px 16px;
                        border-radius: 6px;
                        cursor: pointer;
                        font-size: 13px;
                        display: flex;
                        align-items: center;
                        gap: 8px;
                        transition: background 0.2s;
                    ">
                        <i class="fab fa-google"></i>
                        Connect to Google
                    </button>
                </div>
            </div>
        </div>

        <div id="main-table-view" class="view-content active">
            <div class="table-window glass-panel">
                <div class="table-scroll">
                    <table id="tasksTable">
                        <thead>
                            <tr>
                                <th style="width: 20%;">משימה</th>
                                <th style="width: 10%; text-align: center;">סטטוס</th>
                                <th style="width: 10%; text-align: center;">עדיפות</th>
                                <th style="width: 10%; text-align: center;">נוצר</th>
                                <th style="width: 10%; text-align: center;">תאריך יעד</th>
                                <th style="width: 10%; text-align: center;">בעלים 2</th>
                                <th style="width: 10%; text-align: center;">אירוע</th>
                                <th style="width: 10%;">קישורים</th>
                                <th style="width: 10%;">הערות</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Content will be injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="email-mgmt-modal" class="notes-overlay">
            <div class="contacts-modal glass-panel">
                <div class="notes-header">
                    <h2 style="margin:0; font-weight:500;">ניהול אנשי קשר (ספר כתובות)</h2>
                    <button onclick="closeEmailModal()" class="save-btn"
                        style="width:auto; padding: 6px 12px; background: rgba(255,255,255,0.05);">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div style="padding: 24px; overflow-y: auto;">
                    <button onclick="addEmailToList()" class="save-btn"
                        style="width: 100%; margin-bottom: 24px; background: var(--group-itzik);">
                        <i class="fas fa-plus"></i> הוסף איש קשר חדש
                    </button>
                    <div id="emailListContainer" style="display: flex; flex-direction: column; gap: 12px;">
                        <!-- Emails will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .arrow-btn {
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
        }

        .arrow-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .arrow-collapsed {
            transform: rotate(-90deg);
        }
    </style>

    <script>
        // Global State
        let dashboardData = [];
        let currentTab = 'main-table';

        // Google Auth Globals
        const CLIENT_ID = '179685392572-8af2m2sgqb5p35ivmra60o6imu69gee4.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/gmail.send';
        const SPREADSHEET_ID = '1UYD6JAdXouNbNtNpiTIHg03ghNK64uwzSYKhUGhQZkI';
        const RANGE = 'A2:R';
        const CONTACTS_CELL = 'Z1'; // Cell for storing contacts JSON
        let emailList = []; // Array of { name, email } 
        let tokenClient;
        let gAccessToken = null;
        let CURRENT_SHEET_NAME = '';
        let CURRENT_SHEET_ID = null; // Numeric ID for batchUpdate

        // Status Config
        const STATUS_OPTIONS = [
            { label: 'Done', color: 'var(--status-done)', class: 'bg-done' },
            { label: 'Working on it', color: 'var(--status-working)', class: 'bg-working' },
            { label: 'Stuck', color: 'var(--status-stuck)', class: 'bg-stuck' },
            { label: 'Waiting', color: 'var(--status-waiting)', class: 'bg-waiting' },
            { label: 'Empty', color: 'transparent', class: 'bg-empty' }
        ];

        const PRIORITY_OPTIONS = [
            { label: 'High', color: 'var(--priority-high)', class: 'bg-high' },
            { label: 'Medium', color: 'var(--priority-medium)', class: 'bg-medium' },
            { label: 'Low', color: 'var(--priority-low)', class: 'bg-low' },
            { label: 'Critical', color: 'var(--priority-critical)', class: 'bg-critical' },
            { label: '-', color: 'transparent', class: 'bg-empty' }
        ];

        let activeDropdownElement = null;

        // --- Views ---
        window.switchView = function (viewId) {
            if (viewId === 'main-table') {
                fetchSheetsData(gAccessToken);
            }
        };

        window.openEmailModal = function () {
            const modal = document.getElementById('email-mgmt-modal');
            if (modal) {
                modal.classList.add('open');
                renderEmailList();
                fetchEmails();
            }
        };

        window.closeEmailModal = function () {
            const modal = document.getElementById('email-mgmt-modal');
            if (modal) modal.classList.remove('open');
        };

        // --- Email Management Logic ---

        async function fetchEmails() {
            if (!gAccessToken) return;
            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/'${CURRENT_SHEET_NAME}'!${CONTACTS_CELL}`;
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${gAccessToken}` }
                });
                const result = await response.json();

                if (result.values && result.values[0] && result.values[0][0]) {
                    try {
                        emailList = JSON.parse(result.values[0][0]);
                    } catch (e) { emailList = []; }
                } else {
                    emailList = [];
                }
                renderEmailList();
            } catch (err) {
                console.error("Fetch Emails (Z1) Error:", err);
                emailList = [];
                renderEmailList();
            }
        }

        function renderEmailList() {
            const container = document.getElementById('emailListContainer');
            if (!container) return;

            // Updated datalist for the table: select Name, show Email as hint
            let datalist = document.getElementById('emailOptions');
            if (!datalist) {
                datalist = document.createElement('datalist');
                datalist.id = 'emailOptions';
                document.body.appendChild(datalist);
            }
            datalist.innerHTML = emailList.map(e => `<option value="${e.name}">${e.email}</option>`).join('');

            if (emailList.length === 0) {
                container.innerHTML = `<div style="text-align: center; padding: 20px; opacity: 0.5;">ספר הכתובות ריק. הוסיפו אנשי קשר.</div>`;
                return;
            }

            container.innerHTML = emailList.map((item, idx) => `
                <div class="glass-panel" style="padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #3498db; margin-bottom: 8px; background: rgba(255,255,255,0.03);">
                    <div style="text-align: right;">
                        <div style="font-weight: 500; font-size: 14px;">${item.name}</div>
                        <div style="font-size: 11px; opacity: 0.6;">${item.email}</div>
                    </div>
                    <button onclick="deleteEmail(${idx})" style="background: transparent; border: none; color: #e74c3c; cursor: pointer; padding: 5px;">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        window.addEmailToList = async function () {
            const name = prompt("שם איש הקשר (השם שיופיע בטבלה):");
            if (!name) return;
            const email = prompt(`כתובת המייל של ${name}:`);
            if (!email || !email.includes('@')) {
                alert("כתובת מייל לא תקינה");
                return;
            }

            emailList.push({ name, email });
            renderEmailList();
            await saveEmailsToSheet();
        };

        window.deleteEmail = async function (idx) {
            if (!confirm("האם למחוק איש קשר זה?")) return;
            emailList.splice(idx, 1);
            renderEmailList();
            await saveEmailsToSheet();
        };

        async function saveEmailsToSheet() {
            if (!gAccessToken || !CURRENT_SHEET_NAME) return;
            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/'${CURRENT_SHEET_NAME}'!${CONTACTS_CELL}?valueInputOption=USER_ENTERED`;
                await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${gAccessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ values: [[JSON.stringify(emailList)]] })
                });
            } catch (err) {
                console.error("Save Emails (Z1) Error:", err);
            }
        }

        // --- Render Functions ---

        async function sendTaskEmail(groupIndex, taskIndex, subIndex) {
            if (!gAccessToken) {
                alert("Please connect to Google first.");
                return;
            }

            const task = subIndex === null
                ? dashboardData[groupIndex].items[taskIndex]
                : dashboardData[groupIndex].items[taskIndex].subitems[subIndex];

            const targetName = task.secondOwner;
            const contact = emailList.find(c => c.name === targetName);
            const targetEmail = contact ? contact.email : (targetName.includes('@') ? targetName : null);

            if (!targetEmail) {
                alert("אנא בחר איש קשר (מייל) למשימה לפני השליחה.");
                return;
            }

            const subject = `עדכון משימה: ${task.name}`;
            const bodyHtml = `
                <div style="font-family: sans-serif; max-width: 600px; border: 1px solid #eee; padding: 20px; border-radius: 10px;">
                    <h2 style="color: #3498db; margin-top: 0;">עדכון משימה חדשה</h2>
                    <p>קיבלת עדכון עבור המשימה הבאה:</p>
                    <table style="width: 100%; border-collapse: collapse;">
                        <tr><td style="padding: 8px; border-bottom: 1px solid #eee;"><strong>משימה:</strong></td><td style="padding: 8px; border-bottom: 1px solid #eee;">${task.name}</td></tr>
                        <tr><td style="padding: 8px; border-bottom: 1px solid #eee;"><strong>סטטוס:</strong></td><td style="padding: 8px; border-bottom: 1px solid #eee;">${task.status || '-'}</td></tr>
                        <tr><td style="padding: 8px; border-bottom: 1px solid #eee;"><strong>עדיפות:</strong></td><td style="padding: 8px; border-bottom: 1px solid #eee;">${task.priority || '-'}</td></tr>
                        <tr><td style="padding: 8px; border-bottom: 1px solid #eee;"><strong>דד-ליין:</strong></td><td style="padding: 8px; border-bottom: 1px solid #eee;">${task.deadline || '-'}</td></tr>
                    </table>
                    <div style="margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 5px;">
                        <strong>הערות:</strong><br>
                        ${task.note || 'אין הערות נוספות.'}
                    </div>
                    <p style="font-size: 12px; color: #777; margin-top: 20px;">נשלח ממערכת ניהול המשימות של WSC Sports.</p>
                </div>
            `;

            try {
                const utf8Subject = `=?utf-8?B?${btoa(unescape(encodeURIComponent(subject)))}?=`;
                const emailContent = [
                    `To: ${targetEmail}`,
                    `Subject: ${utf8Subject}`,
                    `MIME-Version: 1.0`,
                    `Content-Type: text/html; charset=utf-8`,
                    ``,
                    bodyHtml
                ].join('\n');

                const base64EncodedEmail = btoa(unescape(encodeURIComponent(emailContent)))
                    .replace(/\+/g, '-')
                    .replace(/\//g, '_')
                    .replace(/=+$/, '');

                const response = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/send`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${gAccessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ raw: base64EncodedEmail })
                });

                if (response.ok) {
                    alert(`המייל נשלח בהצלחה ל-${targetEmail}`);
                } else {
                    const err = await response.json();
                    console.error("Gmail Error:", err);
                    alert("שגיאה בשליחת המייל. וודא שיש לך הרשאות מתאימות.");
                }
            } catch (err) {
                console.error("Fetch Error:", err);
                alert("שגיאה בתקשורת מול Gmail.");
            }
        }

        // --- Notes Panel Logic ---
        let activeNoteContext = null;

        window.formatNote = function (cmd, value = null) {
            document.execCommand(cmd, false, value);
            document.getElementById('notesEditor').focus();
        };

        window.openNotes = function (gIdx, tIdx, sIdx) {
            const item = sIdx !== null ? dashboardData[gIdx].items[tIdx].subitems[sIdx] : dashboardData[gIdx].items[tIdx];
            activeNoteContext = { gIdx, tIdx, sIdx, item };

            document.getElementById('notesTitle').innerText = item.name || 'עריכת הערה';
            document.getElementById('notesEditor').innerHTML = item.note || '';

            document.getElementById('notesPanel').classList.add('open');
            document.getElementById('notesOverlay').classList.add('open');
            document.getElementById('notesEditor').focus();
        };

        window.closeNotes = function () {
            document.getElementById('notesPanel').classList.remove('open');
            document.getElementById('notesOverlay').classList.remove('open');
            activeNoteContext = null;
        };

        window.saveAndClose = function () {
            window.saveNotes();
        };

        window.saveNotes = function () {
            if (!activeNoteContext) return;
            const newVal = document.getElementById('notesEditor').innerHTML;
            const { item } = activeNoteContext;

            // UI Update
            item.note = newVal;

            // API Update
            if (gAccessToken && item.rowIndex) {
                updateGoogleSheet(item.rowIndex, item.noteCol, newVal);
            }

            renderTable();
            closeNotes();
        };

        // Listen for formatting changes to update toolbar
        document.addEventListener('selectionchange', () => {
            const editor = document.getElementById('notesEditor');
            if (!editor || document.activeElement !== editor) return;

            const commands = [
                { id: 'bold', cmd: 'bold' },
                { id: 'italic', cmd: 'italic' },
                { id: 'underline', cmd: 'underline' },
                { id: 'insertUnorderedList', cmd: 'insertUnorderedList' },
                { id: 'insertOrderedList', cmd: 'insertOrderedList' }
            ];

            commands.forEach(c => {
                const btn = document.querySelector(`button[onclick*="'${c.cmd}'"]`);
                if (btn) {
                    if (document.queryCommandState(c.cmd)) btn.classList.add('active');
                    else btn.classList.remove('active');
                }
            });
        });

        // --- Dropdown Logic ---

        function openDropdown(event, gIdx, tIdx, sIdx, type) {
            event.stopPropagation();
            closeDropdown();

            const options = type === 'status' ? STATUS_OPTIONS : PRIORITY_OPTIONS;
            const element = event.target.closest('.status-pill') || event.target;
            activeDropdownElement = element;

            const dropdown = document.createElement('div');
            dropdown.className = 'status-dropdown';
            dropdown.style.position = 'absolute';
            dropdown.style.zIndex = '1000';
            dropdown.style.background = 'rgba(30, 30, 30, 0.95)';
            dropdown.style.backdropFilter = 'blur(10px)';
            dropdown.style.border = '1px solid rgba(255,255,255,0.1)';
            dropdown.style.borderRadius = '8px';
            dropdown.style.padding = '8px';
            dropdown.style.minWidth = '160px';
            dropdown.style.boxShadow = '0 4px 20px rgba(0,0,0,0.5)';

            let htmlContent = '';
            options.forEach(opt => {
                htmlContent += `
                    <div style="padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; border-radius: 6px; transition: background 0.2s;" 
                         onmouseover="this.style.background='rgba(255,255,255,0.1)'" 
                         onmouseout="this.style.background='transparent'"
                         onclick="applyStatus('${opt.label}', ${gIdx}, ${tIdx}, ${sIdx}, '${type}')">
                        <div style="width: 8px; height: 8px; border-radius: 50%; background: ${opt.color};"></div>
                        <span style="font-size: 13px; color: var(--text-primary);">${opt.label}</span>
                    </div>
                `;
            });
            htmlContent += `<div style="height: 1px; background: rgba(255,255,255,0.1); margin: 6px 0;"></div>`;
            htmlContent += `
                <div style="padding: 4px;">
                    <input type="text" placeholder="Add custom..." 
                           style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 6px 8px; border-radius: 4px; font-size: 12px; outline: none;"
                           onkeydown="handleCustomInput(event, ${gIdx}, ${tIdx}, ${sIdx}, '${type}')">
                </div>
            `;
            dropdown.innerHTML = htmlContent;

            const rect = element.getBoundingClientRect();
            let top = rect.bottom + 6;
            if (top + 200 > window.innerHeight) top = rect.top - 200;

            dropdown.style.left = rect.left + 'px';
            dropdown.style.top = top + 'px';

            document.body.appendChild(dropdown);
            setTimeout(() => { document.addEventListener('click', closeDropdown); }, 0);
        }

        function closeDropdown() {
            const existing = document.querySelector('.status-dropdown');
            if (existing) existing.remove();
            document.removeEventListener('click', closeDropdown);
        }

        function handleCustomInput(e, gIdx, tIdx, sIdx, type) {
            if (e.key === 'Enter') {
                const val = e.target.value.trim();
                if (val) applyStatus(val, gIdx, tIdx, sIdx, type);
            }
        }

        function applyStatus(value, gIdx, tIdx, sIdx, type) {
            let item = dashboardData[gIdx].items[tIdx];
            if (sIdx !== null) item = item.subitems[sIdx];

            const finalValue = value === 'Empty' || value === '-' ? '' : value;

            if (type === 'status') {
                item.status = finalValue;
                const colLetter = item.statusCol || (sIdx !== null ? 'D' : 'B');
                if (item.rowIndex && gAccessToken) updateGoogleSheet(item.rowIndex, colLetter, finalValue);
            } else {
                item.priority = finalValue;
                const colLetter = item.priorityCol || 'E';
                if (item.rowIndex && gAccessToken) updateGoogleSheet(item.rowIndex, colLetter, finalValue);
            }
            renderTable();
            closeDropdown();
        }

        // --- Helpers ---

        function getStatusClass(status) {
            if (!status) return 'bg-empty';
            const s = status.toLowerCase();
            if (s.includes('done')) return 'bg-done';
            if (s.includes('working')) return 'bg-working';
            if (s.includes('stuck')) return 'bg-stuck';
            if (s.includes('wait')) return 'bg-waiting';
            return 'bg-custom';
        }

        function getPriorityClass(priority) {
            if (!priority) return 'bg-empty';
            const p = priority.toLowerCase();
            if (p.includes('high')) return 'bg-high';
            if (p.includes('medium')) return 'bg-medium';
            if (p.includes('low')) return 'bg-low';
            if (p.includes('critical')) return 'bg-critical';
            return 'bg-custom';
        }

        function indexToColumnLetter(index) {
            let letter = '';
            while (index >= 0) {
                letter = String.fromCharCode((index % 26) + 65) + letter;
                index = Math.floor(index / 26) - 1;
            }
            return letter;
        }

        // --- Toggles ---

        window.toggleGroup = function (index) {
            dashboardData[index].isCollapsed = !dashboardData[index].isCollapsed;
            renderTable();
        };

        window.toggleTask = function (groupIndex, taskIndex) {
            dashboardData[groupIndex].items[taskIndex].isCollapsed = !dashboardData[groupIndex].items[taskIndex].isCollapsed;
            renderTable();
        };

        // --- Add SubItem ---

        window.addSubItem = async function (groupIndex, taskIndex) {
            const task = dashboardData[groupIndex].items[taskIndex];
            const newName = prompt("Enter sub-item name:", "New Subitem");
            if (!newName) return;

            // Optimistic Update
            const now = new Date();
            const creationDate = `${now.getDate().toString().padStart(2, '0')}/${(now.getMonth() + 1).toString().padStart(2, '0')}/${now.getFullYear()}`;
            const creationInput = `${now.getFullYear()}-${(now.getMonth() + 1).toString().padStart(2, '0')}-${now.getDate().toString().padStart(2, '0')}`;

            task.subitems.push({
                name: newName,
                status: 'Working on it',
                priority: '',
                creation: creationDate,
                creationInputFormat: creationInput,
                deadline: '',
                deadlineInputFormat: '',
                monthly: '',
                link: '',
                note: '',
                rowIndex: null
            });
            renderTable();

            if (!gAccessToken || !CURRENT_SHEET_ID) {
                if (!gAccessToken) alert("Please connect to Google first.");
                else alert("Error: Could not determine Sheet ID. Try refreshing the page.");
                return;
            }

            const insertIndex = (task.rowIndex - 1) + task.subitems.length;

            try {
                // Batch Update: Insert Row AND Group It
                const batchUpdateRequest = {
                    requests: [
                        {
                            insertDimension: {
                                range: {
                                    sheetId: CURRENT_SHEET_ID,
                                    dimension: "ROWS",
                                    startIndex: insertIndex,
                                    endIndex: insertIndex + 1
                                },
                                inheritFromBefore: true
                            }
                        },
                        {
                            addDimensionGroup: {
                                range: {
                                    sheetId: CURRENT_SHEET_ID,
                                    dimension: "ROWS",
                                    startIndex: insertIndex,
                                    endIndex: insertIndex + 1
                                }
                            }
                        }
                    ]
                };

                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}:batchUpdate`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${gAccessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(batchUpdateRequest)
                });

                console.log("Inserted & Grouped row at index", insertIndex);

                // 2. Update Cell Values
                const newRowVal = insertIndex + 1;
                const updateRange = `${CURRENT_SHEET_NAME}!B${newRowVal}:R${newRowVal}`; // Extened range
                const values = new Array(17).fill(""); // B to R is 17 columns
                values[0] = newName; // Col B
                values[2] = "Working on it"; // Col D
                values[6] = creationDate; // Col H

                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${updateRange}?valueInputOption=USER_ENTERED`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${gAccessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ values: [values] })
                });

                // 3. Refresh
                setTimeout(() => fetchSheetsData(gAccessToken), 750);

            } catch (e) {
                console.error("Add Subitem Failed:", e);
                alert("Failed to add subitem: " + e.message);
            }
        };

        // --- Date Helper ---
        function parseDateHelper(rawDate) {
            if (!rawDate) return "";
            rawDate = String(rawDate).trim();
            if (!rawDate || rawDate === "-") return "";

            let d, m, y;
            // Handle various delimiters: / . -
            const parts = rawDate.split(/[\/\.\-\s]+/);

            if (parts.length >= 3) {
                if (parts[0].length === 4) {
                    // yyyy mm dd
                    [y, m, d] = parts;
                } else {
                    // dd mm yyyy or dd mm yy
                    [d, m, y] = parts;
                }
            } else {
                return "";
            }

            if (d && m && y) {
                // Normalize year
                if (y.length === 2) {
                    y = (parseInt(y) > 50 ? "19" : "20") + y;
                }
                // Final validation: year must be 4 digits, month 1-12, day 1-31
                if (y.length === 4 && !isNaN(y) && !isNaN(m) && !isNaN(d)) {
                    return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                }
            }
            return "";
        }

        // --- Google Auth & Sync ---

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '',
            });
            document.getElementById('authorize_button').style.visibility = 'visible';
        }

        window.handleAuthClick = function () {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) throw (resp);
                gAccessToken = resp.access_token;
                document.getElementById('authorize_button').innerText = "Refreshing...";
                await fetchSheetsData(resp.access_token);
                await fetchEmails();
                document.getElementById('authorize_button').innerHTML = '<i class="fas fa-check"></i> Connected';
            };
            tokenClient.requestAccessToken({ prompt: 'consent' });
        };

        async function fetchSheetsData(accessToken) {
            try {
                // 1. Get Metadata for Sheet ID
                const metaRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const meta = await metaRes.json();

                // 2. Get Values
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const result = await response.json();

                if (result.range) {
                    const match = result.range.match(/^(.*?)!/);
                    if (match) {
                        CURRENT_SHEET_NAME = match[1].replace(/^'|'$/g, '');
                        const sheetObj = meta.sheets.find(s => s.properties.title === CURRENT_SHEET_NAME);
                        if (sheetObj) CURRENT_SHEET_ID = sheetObj.properties.sheetId;
                        else console.error("Could not find Sheet ID for name:", CURRENT_SHEET_NAME);
                    }
                }

                const rows = result.values;
                if (!rows || rows.length === 0) {
                    console.warn("No data found in the specified range.");
                    return;
                }

                console.log("Raw Sheets Data (first 5 rows):", rows.slice(0, 5));
                dashboardData = parseRowsToDashboard(rows);
                console.log("Parsed Dashboard Data:", dashboardData);
                renderTable();

            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        function parseRowsToDashboard(rows) {
            const newStructure = [];
            let currentGroup = null;
            let currentParentTask = null;

            // Header Search & Column Mapping
            // Header Search & Column Mapping
            let headerRowIndex = -1;
            // Default Mapping (Name=A, Sub=B, Link=C, Status=D, Priority=E, Note=F, Creation=H, Date=I, Monthly=J)
            let colMap = { name: 0, subitem: 1, link: 2, status: 3, priority: 4, note: 5, creation: 7, date: 8, monthly: 9 };

            for (let i = 0; i < Math.min(rows.length, 20); i++) {
                const rowStr = rows[i].map(c => c.toLowerCase()).join(" ");
                // Check for English OR Hebrew keywords
                if ((rowStr.includes("name") || rowStr.includes("משימה")) &&
                    (rowStr.includes("status") || rowStr.includes("סטטוס") || rowStr.includes("priority") || rowStr.includes("עדיפות"))) {

                    headerRowIndex = i;
                    rows[i].forEach((cell, idx) => {
                        const c = cell.toLowerCase().trim();
                        // Name
                        if (c === "name" || c === "task name" || c === "item" || c.includes("משימה")) colMap.name = idx;
                        // Subitems
                        else if (c.includes("subitems") || c.includes("sub-item") || c.includes("תת") || c.includes("תתי")) colMap.subitem = idx;
                        // Link
                        else if (c.includes("link") || c.includes("url") || c.includes("קישור")) colMap.link = idx;
                        // Status
                        else if (c.includes("status") || c.includes("סטטוס")) colMap.status = idx;
                        // Priority
                        else if (c.includes("priority") || c.includes("עדיפות")) colMap.priority = idx;
                        // Date (Deadline)
                        else if (c.includes("deadline") || c.includes("יעד") || c.includes("תאריך יעד") || (c === "תאריך")) colMap.date = idx;
                        // Monthly Event
                        else if (c.includes("monthly") || c.includes("event") || c.includes("חודשי") || c.includes("אירוע")) colMap.monthly = idx;
                        // Note
                        else if (c.includes("note") || c.includes("הערות") || c.includes("notes")) colMap.note = idx;
                        // Creation Date
                        else if (c.includes("created") || c.includes("creation") || c.includes("נוצר") || c.includes("תאריך יצירה")) colMap.creation = idx;
                        // Second Owner
                        else if (c.includes("second owner") || c.includes("seconed owner") || c.includes("בעלים 2") || c.includes("נוסף") || c.includes("בעלים נוסף")) colMap.secondOwner = idx;
                    });
                    console.log("Detected Columns:", colMap);
                    break;
                }
            }

            const START_ROW = 2; // Approximation
            const iterStart = headerRowIndex !== -1 ? headerRowIndex + 1 : 0;
            const statusColLetter = indexToColumnLetter(colMap.status);
            const priorityColLetter = indexToColumnLetter(colMap.priority);
            const dateColLetter = indexToColumnLetter(colMap.date);
            const linkColLetter = indexToColumnLetter(colMap.link);
            const noteColLetter = indexToColumnLetter(colMap.note);
            const monthlyColLetter = indexToColumnLetter(colMap.monthly);
            const creationColLetter = indexToColumnLetter(colMap.creation !== undefined ? colMap.creation : 7);

            rows.slice(iterStart).forEach((row, index) => {
                const globalRowIndex = START_ROW + iterStart + index;
                const colName = String(row[colMap.name] || "").trim();
                const colSub = String(row[colMap.subitem] || "").trim();

                const isGroupHeader = colName.toLowerCase().includes("open tasks") || colName.toLowerCase().includes("general");

                if (isGroupHeader) {
                    if (colName.toLowerCase().includes("itzik")) {
                        currentGroup = {
                            id: "g_itzik",
                            title: colName,
                            color: "var(--group-itzik)",
                            isCollapsed: false,
                            items: []
                        };
                        newStructure.push(currentGroup);
                        currentParentTask = null;
                    } else {
                        currentGroup = null;
                    }
                    return;
                }

                if (currentGroup) {
                    // Check if Main Task (has Name)
                    if (colName && colName !== "Name" && colName !== "Subitems") {
                        // Date Parsing
                        // Date Parsing moved to helper
                        let rawDate = row[colMap.date] || "";

                        const task = {
                            name: colName,
                            status: row[colMap.status] || "",
                            priority: row[colMap.priority] || "",
                            deadline: rawDate,
                            deadlineInputFormat: parseDateHelper(rawDate),
                            creation: row[colMap.creation] || "",
                            creationInputFormat: "", // Calculated below
                            link: row[colMap.link] || "",
                            note: row[colMap.note] || "",
                            monthly: row[colMap.monthly] || "",
                            isCollapsed: true,
                            subitems: [],
                            rowIndex: globalRowIndex,
                            statusCol: statusColLetter,
                            priorityCol: priorityColLetter,
                            creationCol: indexToColumnLetter(colMap.creation),
                            dateCol: dateColLetter, // Stored as 'deadlineCol' usage
                            deadlineCol: dateColLetter,
                            secondOwner: row[colMap.secondOwner] || "",
                            secondOwnerCol: indexToColumnLetter(colMap.secondOwner),
                            linkCol: linkColLetter,
                            noteCol: noteColLetter,
                            monthlyCol: monthlyColLetter
                        };

                        // Parse Creation Date for Input
                        task.creationInputFormat = parseDateHelper(task.creation);

                        currentGroup.items.push(task);
                        currentParentTask = task; // Set parent for next iteration subitems
                    }
                    // Check if Subitem (No Name to A, Has Text in B)
                    else if (!colName && colSub && currentParentTask) {
                        const sTask = {
                            name: colSub,
                            status: row[colMap.status] || "",
                            priority: row[colMap.priority] || "",
                            creation: row[colMap.creation] || "",
                            deadline: row[colMap.date] || "",
                            monthly: row[colMap.monthly] || "",
                            link: row[colMap.link] || "",
                            note: row[colMap.note] || "",
                            rowIndex: globalRowIndex,
                            statusCol: statusColLetter,
                            priorityCol: priorityColLetter,
                            creationCol: indexToColumnLetter(colMap.creation),
                            deadlineCol: dateColLetter,
                            secondOwner: row[colMap.secondOwner] || "",
                            secondOwnerCol: indexToColumnLetter(colMap.secondOwner),
                            linkCol: linkColLetter,
                            noteCol: noteColLetter,
                            monthlyCol: monthlyColLetter
                        };
                        // Parse Dates
                        sTask.creationInputFormat = parseDateHelper(sTask.creation);
                        sTask.deadlineInputFormat = parseDateHelper(sTask.deadline);

                        currentParentTask.subitems.push(sTask);
                    }
                }
            });
            return newStructure;
        }

        function updateFreeText(rowIndex, colLetter, value) {
            if (!gAccessToken || !CURRENT_SHEET_ID) return;
            // Format date back to dd/mm/yyyy if it looks like yyyy-mm-dd
            if (value.match(/^\d{4}-\d{2}-\d{2}$/)) {
                const [y, m, d] = value.split('-');
                value = `${d}/${m}/${y}`;
            }
            updateGoogleSheet(rowIndex, colLetter, value);
        }

        async function updateGoogleSheet(rowIndex, colLetter, value) {
            if (!gAccessToken || !CURRENT_SHEET_NAME) return;
            const range = `${CURRENT_SHEET_NAME}!${colLetter}${rowIndex}`;
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}?valueInputOption=USER_ENTERED`;

            try {
                await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${gAccessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ values: [[value]] })
                });
                console.log("Updated Google Sheet:", range, "->", value);
            } catch (e) {
                console.error("Update failed", e);
            }
        }

        renderTable();
    </script>
